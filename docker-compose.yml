version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: moltrade-db
    environment:
      POSTGRES_USER: moltrade
      POSTGRES_PASSWORD: moltrade
      POSTGRES_DB: moltrade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moltrade"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moltrade-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  yfinance:
    build:
      context: ./services/yfinance
      dockerfile: Dockerfile
    container_name: moltrade-yfinance
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
